name: Build VeilChat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Validate static files
        run: |
          test -f dist/index.html
          test -f dist/service-worker.js
          test -f dist/manifest.json
          test -d dist/assets
          test -d dist/js
          test -d dist/icons

      - name: Trigger VeilStudio Cloudflare Pages deployment
        if: github.event_name == 'push'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VEILSTUDIO_DISPATCH_TOKEN }}
          repository: rcwells1879/VeilStudio
          event-type: veilchat-updated
          client-payload: '{"source_repo":"veil-chat","source_sha":"${{ github.sha }}","source_ref":"${{ github.ref_name }}"}'
